<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blommunity 운영자 어드민 콘솔</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f7f7f8; }
  #root { height: 100%; }
  * { -webkit-font-smoothing: antialiased; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#4f46e5"/>
    <rect x="28" y="30" width="44" height="40" rx="8" fill="#fff"/>
    <text x="50" y="51" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#4f46e5" text-anchor="middle" dominant-baseline="central">b</text>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../components/console-system.jsx"></script>
<script type="text/babel" src="../components/admin-data.jsx"></script>
<script type="text/babel" src="../components/admin-core.jsx"></script>
<script type="text/babel" src="../components/admin-shell.jsx"></script>
<script type="text/babel" src="../components/admin-login.jsx"></script>
<script type="text/babel" src="../components/admin-dashboard.jsx"></script>
<script type="text/babel" src="../components/admin-tenants.jsx"></script>
<script type="text/babel" src="../components/admin-operators.jsx"></script>
<script type="text/babel" src="../components/admin-audit.jsx"></script>
<script type="text/babel" src="../components/admin-settings.jsx"></script>

<script type="text/babel">
  function Router() {
    const app = useApp();
    if (!app.authed) return <LoginScreen />;
    switch (app.route.screen) {
      case 'tenants': return <TenantsScreen />;
      case 'tenant': return <TenantDetailScreen />;
      case 'operators': return <OperatorsScreen />;
      case 'audit': return <AuditScreen />;
      case 'settings': return <SettingsScreen />;
      case 'dashboard':
      default: return <DashboardScreen />;
    }
  }

  function Root() {
    return (
      <AdminProvider>
        <Router />
      </AdminProvider>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
