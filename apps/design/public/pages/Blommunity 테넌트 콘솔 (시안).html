<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blommunity 콘솔 — 시안</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { -webkit-font-smoothing: antialiased; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#4f46e5"/>
    <rect x="30" y="30" width="40" height="40" rx="9" fill="#fff"/>
    <text x="50" y="50" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#4f46e5" text-anchor="middle" dominant-baseline="central">북</text>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../components/design-canvas.jsx"></script>
<script type="text/babel" src="../components/console-system.jsx"></script>
<script type="text/babel" src="../components/screen-dashboard.jsx"></script>
<script type="text/babel" src="../components/screen-spaces.jsx"></script>

<script type="text/babel">
  const noop = () => {};

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="screens" title="Blommunity 테넌트 콘솔" subtitle="지은의 작업실 · 데스크톱 1440px">
          <DCArtboard id="dashboard" label="대시보드 · Light" width={1440} height={720}>
            <Dashboard onNav={noop} />
          </DCArtboard>
          <DCArtboard id="spaces-light" label="공간 관리 · Light" width={1440} height={800}>
            <SpaceMgmt onNav={noop} />
          </DCArtboard>
          <DCArtboard id="spaces-dark" label="공간 관리 · Dark" width={1440} height={800}>
            <SpaceMgmt onNav={noop} dark />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
