<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
<style>
  html,body{margin:0}
  body{font-family:"Inter",system-ui,sans-serif;background:#fff;padding:24px 26px;color:#18181b;display:flex;gap:18px;align-items:flex-end}
  .item{text-align:center}
  .box{width:74px;height:60px;background:#eef0fe;border:1.5px solid #4f46e5;border-bottom:none}
  .nm{font-size:11px;font-weight:600;color:#27272a;margin-top:10px}
  .v{font-size:10.5px;color:#92929c;margin-top:1px}
</style></head>
<body>
  <div class="item"><div class="box" style="border-top-left-radius:5px;border-top-right-radius:5px"></div><div class="nm">xs</div><div class="v">5px · badge</div></div>
  <div class="item"><div class="box" style="border-top-left-radius:6px;border-top-right-radius:6px"></div><div class="nm">sm</div><div class="v">6px · button</div></div>
  <div class="item"><div class="box" style="border-top-left-radius:7px;border-top-right-radius:7px"></div><div class="nm">md</div><div class="v">7px · input</div></div>
  <div class="item"><div class="box" style="border-top-left-radius:8px;border-top-right-radius:8px"></div><div class="nm">lg</div><div class="v">8px · seg</div></div>
  <div class="item"><div class="box" style="border-top-left-radius:10px;border-top-right-radius:10px"></div><div class="nm">xl</div><div class="v">10px · card</div></div>
  <div class="item"><div class="box" style="border-top-left-radius:11px;border-top-right-radius:11px"></div><div class="nm">2xl</div><div class="v">11px · icon</div></div>
  <div class="item"><div class="box" style="width:60px;height:60px;border-radius:50%;border-bottom:1.5px solid #4f46e5"></div><div class="nm">pill</div><div class="v">999 · avatar</div></div>
</body></html>
