<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<style>
  html,body{margin:0}
  body{font-family:"Inter",system-ui,sans-serif;background:#fbfbf9;padding:24px 26px;display:flex;align-items:flex-end;gap:30px}
  .item{text-align:center}
  .swatch{display:flex;align-items:center;justify-content:center;border-radius:12px}
  .cap{font-size:11.5px;color:#71717a;margin-top:10px;letter-spacing:.01em}
  .b{font-weight:600;color:#27272a}
  .grad{width:96px;height:96px;background:linear-gradient(180deg,#6366f1,#4f46e5)}
  .onlight{width:84px;height:84px;background:#fff;border:1px solid #e7e7ea}
  .ondark{width:84px;height:84px;background:#0a0a0c}
  img{display:block}
</style></head>
<body>
  <div class="item"><div class="swatch grad"><img src="../assets/blommunity-mark-white.svg" width="48" height="48"/></div><div class="cap"><span class="b">App icon</span><br/>gradient + knockout</div></div>
  <div class="item"><div class="swatch onlight"><img src="../assets/blommunity-mark.svg" width="46" height="46"/></div><div class="cap"><span class="b">Mark</span><br/>indigo on light</div></div>
  <div class="item"><div class="swatch ondark"><img src="../assets/blommunity-mark-white.svg" width="46" height="46"/></div><div class="cap"><span class="b">Mark</span><br/>white on dark</div></div>
  <div class="item"><div class="swatch onlight"><img src="../assets/blommunity-mark-mono.svg" width="46" height="46"/></div><div class="cap"><span class="b">Mono</span><br/>single-color</div></div>
</body></html>
