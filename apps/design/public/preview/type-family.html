<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
<style>
  html,body{margin:0}
  body{background:#fff;padding:24px 28px;color:#18181b}
  .row{display:flex;gap:40px}
  .col{flex:1}
  .lbl{font-family:"Inter",sans-serif;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#92929c;margin-bottom:10px}
  .spec{font-size:34px;font-weight:700;letter-spacing:-0.03em;line-height:1.1}
  .sub{font-size:13.5px;color:#5c5c66;margin-top:8px}
  .inter{font-family:"Inter",system-ui,sans-serif}
  .pre{font-family:"Pretendard",sans-serif}
</style></head>
<body>
  <div class="row">
    <div class="col">
      <div class="lbl">Inter · Latin / UI</div>
      <div class="spec inter">Community, organized.</div>
      <div class="sub inter">AaBbCc 0123456789 — weights 400 → 800. Tabular numerals for tables &amp; metrics.</div>
    </div>
    <div class="col">
      <div class="lbl">Pretendard · 한글</div>
      <div class="spec pre">함께 읽고 나누는</div>
      <div class="sub pre">가나다라 0123456789 — 본문·UI 한글. Inter와 동일한 메트릭 계열.</div>
    </div>
  </div>
</body></html>
