<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
<style>
  html,body{margin:0}
  body{font-family:"Inter",system-ui,sans-serif;background:#0a0a0c;padding:22px 26px;color:#f3f3f5}
  .ttl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#6e6e78;margin:0 0 14px}
  .grid{display:flex;gap:0}
  .sw{flex:1}
  .chip{height:58px}
  .first .chip{border-radius:9px 0 0 9px}
  .last .chip{border-radius:0 9px 9px 0}
  .nm{font-size:10.5px;font-weight:600;margin-top:9px;color:#cfcdc6}
  .hex{font-size:10px;color:#6e6e78;font-variant-numeric:tabular-nums;margin-top:1px}
</style></head>
<body>
  <p class="ttl">Console · dark mode (--bl-* .dark)</p>
  <div class="grid">
    <div class="sw first"><div class="chip" style="background:#0a0a0c;border:1px solid #28282e;border-right:none"></div><div class="nm">surface-0</div><div class="hex">#0A0A0C</div></div>
    <div class="sw"><div class="chip" style="background:#141417;border:1px solid #28282e;border-right:none"></div><div class="nm">surface-1</div><div class="hex">#141417</div></div>
    <div class="sw"><div class="chip" style="background:#1c1c20;border:1px solid #28282e;border-right:none"></div><div class="nm">surface-2</div><div class="hex">#1C1C20</div></div>
    <div class="sw"><div class="chip" style="background:#3a3a42"></div><div class="nm">border-str</div><div class="hex">#3A3A42</div></div>
    <div class="sw"><div class="chip" style="background:#6366f1"></div><div class="nm">accent</div><div class="hex">#6366F1</div></div>
    <div class="sw"><div class="chip" style="background:#a5a8fb"></div><div class="nm">accent-text</div><div class="hex">#A5A8FB</div></div>
    <div class="sw"><div class="chip" style="background:#a6a6b0"></div><div class="nm">text-2</div><div class="hex">#A6A6B0</div></div>
    <div class="sw last"><div class="chip" style="background:#f3f3f5"></div><div class="nm">text-1</div><div class="hex">#F3F3F5</div></div>
  </div>
</body></html>
