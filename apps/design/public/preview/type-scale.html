<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
<style>
  html,body{margin:0}
  body{font-family:"Inter",system-ui,sans-serif;background:#fff;padding:22px 28px;color:#18181b}
  .r{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid #f1f1f3}
  .r:last-child{border:none}
  .t{flex:1;color:#1a1a1f}
  .m{font-size:11px;color:#92929c;font-variant-numeric:tabular-nums;white-space:nowrap}
</style></head>
<body>
  <div class="r"><span class="t" style="font-size:30px;font-weight:700;letter-spacing:-0.035em">Display</span><span class="m">30 / 700 / -3.5%</span></div>

  <div class="r"><span class="t" style="font-size:17px;font-weight:700;letter-spacing:-0.02em">Heading 2 · 섹션</span><span class="m">17 / 700 / -2%</span></div>
  <div class="r"><span class="t" style="font-size:14px;font-weight:400">Body · 기본 본문 텍스트</span><span class="m">14 / 400</span></div>
  <div class="r"><span class="t" style="font-size:13px;font-weight:400;color:#5c5c66">Small · 보조 / 테이블 셀</span><span class="m">13 / 400</span></div>
  <div class="r"><span class="t" style="font-size:12px;color:#92929c">Caption · 메타 · 11.5px</span><span class="m">12 / 11.5</span></div>
  <div class="r"><span class="t" style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#92929c">Eyebrow · Label</span><span class="m">11 / 700 / caps</span></div>
</body></html>
