<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"/>
<style>
  html,body{margin:0}
  body{font-family:"Inter","Pretendard",sans-serif;background:#fff;padding:24px 28px;display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
  .av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:600}
  .grp{margin-top:10px}
</style></head>
<body>
  <div class="av" style="background:#4f46e5">지</div>
  <div class="av" style="background:#0e7490">민</div>
  <div class="av" style="background:#b45309">유</div>
  <div class="av" style="background:#9333ea">현</div>
  <div class="av" style="background:#15803d">서</div>
  <div class="av" style="background:#be123c">보</div>
  <div class="av" style="background:#475569">태</div>
  <div class="av" style="background:#0369a1">도</div>
  <div style="display:flex;align-items:center;margin-left:6px">
    <div class="av" style="background:#4f46e5;box-shadow:0 0 0 2px #fff">지</div>
    <div class="av" style="background:#0e7490;box-shadow:0 0 0 2px #fff;margin-left:-14px">민</div>
    <div class="av" style="background:#b45309;box-shadow:0 0 0 2px #fff;margin-left:-14px">유</div>
    <div class="av" style="width:52px;height:52px;border-radius:50%;background:#f4f4f5;color:#5c5c66;box-shadow:0 0 0 2px #fff;margin-left:-14px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600">+5</div>
  </div>
</body></html>
