<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
<style>
  html,body{margin:0}
  body{font-family:"Inter","Pretendard",sans-serif;background:#fbfbf9;padding:24px 26px;color:#1a1a18}
  .row{display:flex;gap:10px;align-items:center;margin-bottom:15px;flex-wrap:wrap}
  .row:last-child{margin-bottom:0}
  .btn{display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 15px;font-size:14px;font-weight:600;border-radius:8px;border:1px solid transparent;letter-spacing:-0.01em;cursor:default}
  .solid{background:#1a1a18;color:#fbfbf9}
  .primary{background:#4f46e5;color:#fff}
  .secondary{background:#fff;color:#1a1a18;border-color:#dcd9d1}
  svg{width:16px;height:16px}
  .tag{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;padding:3px 7px;border-radius:5px}
  .notice{color:#4338ca;background:#eef0fe}
  .soft{color:#6f6e67;background:#f4f3ef;border:1px solid #e9e7e1}
  .like{display:inline-flex;align-items:center;gap:8px;height:46px;padding:0 22px;border-radius:24px;border:1px solid #d6455d;background:#d6455d;color:#fff;font-size:15px;font-weight:700}
  .stat{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;color:#9c9a91;font-weight:500}
  .lbl{font-size:10.5px;color:#9c9a91;width:60px}
</style></head>
<body>
  <div class="row"><span class="lbl">buttons</span>
    <button class="btn solid"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>글쓰기</button>
    <button class="btn primary">등록</button>
    <button class="btn secondary">팔로우</button>
  </div>
  <div class="row"><span class="lbl">tags</span>
    <span class="tag notice"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 17v5M9 3h6l-1 6 3 3v1H7v-1l3-3z"/></svg>공지</span>
    <span class="tag soft">#문장수집</span>
    <span class="tag soft">#에세이</span>
  </div>
  <div class="row"><span class="lbl">engage</span>
    <span class="like"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 20s-7-4.3-9.5-8.6C.9 8.5 2.3 5 5.5 5 7.5 5 9 6.3 12 9c3-2.7 4.5-4 6.5-4 3.2 0 4.6 3.5 3 6.4C19 15.7 12 20 12 20Z"/></svg>좋아요 67</span>
    <span class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 12a8 8 0 0 1-11.5 7.2L3 21l1.8-6.5A8 8 0 1 1 21 12Z"/></svg>23</span>
  </div>
</body></html>
