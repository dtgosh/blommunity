<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
<style>
  html,body{margin:0}
  body{font-family:"Inter",system-ui,sans-serif;background:#fff;padding:24px 26px;color:#18181b;display:flex;gap:14px;align-items:flex-end}
  .item{text-align:center}
  .bar{background:#4f46e5;border-radius:3px;width:100%}
  .row{display:flex;gap:14px;align-items:flex-end}
  .nm{font-size:10.5px;color:#92929c;margin-top:9px;font-variant-numeric:tabular-nums}
  .lead{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#92929c;writing-mode:horizontal-tb;margin-right:6px;align-self:center}
</style></head>
<body>
  <span class="lead">4px base</span>
  <div class="item"><div class="bar" style="height:4px"></div><div class="nm">1 · 4</div></div>
  <div class="item"><div class="bar" style="height:8px"></div><div class="nm">2 · 8</div></div>
  <div class="item"><div class="bar" style="height:12px"></div><div class="nm">3 · 12</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="nm">4 · 16</div></div>
  <div class="item"><div class="bar" style="height:20px"></div><div class="nm">5 · 20</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="nm">6 · 24</div></div>
  <div class="item"><div class="bar" style="height:32px"></div><div class="nm">8 · 32</div></div>
  <div class="item"><div class="bar" style="height:40px"></div><div class="nm">10 · 40</div></div>
  <div class="item"><div class="bar" style="height:48px"></div><div class="nm">12 · 48</div></div>
</body></html>
