<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
<style>
  html,body{margin:0}
  body{font-family:"Inter",system-ui,sans-serif;background:#f7f7f8;padding:30px 26px;color:#18181b;display:flex;gap:30px;align-items:flex-end}
  .item{text-align:center}
  .box{width:120px;height:62px;background:#fff;border-radius:10px}
  .b-card{border:1px solid #e7e7ea}
  .b-pop{box-shadow:0 8px 28px rgba(20,20,30,.12),0 0 0 1px rgba(20,20,30,.05)}
  .b-btn{box-shadow:0 1px 1px rgba(20,20,40,.10)}
  .b-modal{box-shadow:0 24px 60px rgba(0,0,0,.30)}
  .nm{font-size:11.5px;font-weight:600;color:#27272a;margin-top:14px}
  .v{font-size:10.5px;color:#92929c;margin-top:2px}
</style></head>
<body>
  <div class="item"><div class="box b-card"></div><div class="nm">Card border</div><div class="v">1px #E7E7EA</div></div>
  <div class="item"><div class="box b-btn"></div><div class="nm">Button lift</div><div class="v">0 1px 1px / .10</div></div>
  <div class="item"><div class="box b-pop"></div><div class="nm">Popover · toast</div><div class="v">shadow-pop</div></div>
  <div class="item"><div class="box b-modal"></div><div class="nm">Modal</div><div class="v">0 24px 60px / .30</div></div>
</body></html>
