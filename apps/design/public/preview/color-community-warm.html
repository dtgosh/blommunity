<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
<style>
  html,body{margin:0}
  body{font-family:"Inter",system-ui,sans-serif;background:#fbfbf9;padding:22px 26px;color:#1a1a18}
  .ttl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9c9a91;margin:0 0 14px}
  .grid{display:flex;gap:0}
  .sw{flex:1}
  .chip{height:58px}
  .first .chip{border-radius:9px 0 0 9px}
  .last .chip{border-radius:0 9px 9px 0}
  .nm{font-size:10.5px;font-weight:600;margin-top:9px;color:#34332e}
  .hex{font-size:10px;color:#9c9a91;font-variant-numeric:tabular-nums;margin-top:1px}
</style></head>
<body>
  <p class="ttl">Community warm base · --cm-* (re-skinnable, accent swaps per tenant)</p>
  <div class="grid">
    <div class="sw first"><div class="chip" style="background:#fbfbf9;border:1px solid #e9e7e1;border-right:none"></div><div class="nm">paper</div><div class="hex">#FBFBF9</div></div>
    <div class="sw"><div class="chip" style="background:#ffffff;border:1px solid #e9e7e1;border-right:none"></div><div class="nm">surface</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:#f4f3ef;border:1px solid #e9e7e1;border-right:none"></div><div class="nm">surface-2</div><div class="hex">#F4F3EF</div></div>
    <div class="sw"><div class="chip" style="background:#e9e7e1"></div><div class="nm">border</div><div class="hex">#E9E7E1</div></div>
    <div class="sw"><div class="chip" style="background:#9c9a91"></div><div class="nm">faint</div><div class="hex">#9C9A91</div></div>
    <div class="sw"><div class="chip" style="background:#6f6e67"></div><div class="nm">muted</div><div class="hex">#6F6E67</div></div>
    <div class="sw"><div class="chip" style="background:#34332e"></div><div class="nm">text</div><div class="hex">#34332E</div></div>
    <div class="sw last"><div class="chip" style="background:#d6455d"></div><div class="nm">like</div><div class="hex">#D6455D</div></div>
  </div>
</body></html>
