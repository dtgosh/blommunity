<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
<style>
  html,body{margin:0}
  body{font-family:"Inter",system-ui,sans-serif;background:#fbfbf9;color:#18181b;padding:22px 26px;display:flex;align-items:center;gap:34px}
  .panel{display:flex;align-items:center;gap:14px;padding:18px 22px;border-radius:14px}
  .light{background:#fff;border:1px solid #e7e7ea}
  .dark{background:#0a0a0c}
  .mark{width:46px;height:46px;flex-shrink:0}
  .wm{font-size:30px;font-weight:700;letter-spacing:-0.038em}
  .cap{font-size:11.5px;color:#92929c;margin-top:8px;letter-spacing:.02em}
</style></head>
<body>
  <div>
    <div class="panel light">
      <img class="mark" src="../assets/blommunity-appicon.svg" alt="app icon"/>
      <span class="wm" style="color:#18181b">blommunity</span>
    </div>
    <div class="cap">Primary lockup · on light</div>
  </div>
  <div>
    <div class="panel dark">
      <img class="mark" src="../assets/blommunity-appicon.svg" alt="app icon"/>
      <span class="wm" style="color:#fff">blommunity</span>
    </div>
    <div class="cap">Lockup · on dark</div>
  </div>
</body></html>
