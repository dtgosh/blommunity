<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
<style>
  html,body{margin:0}
  body{font-family:"Inter",system-ui,sans-serif;background:#fff;padding:22px 26px;color:#18181b}
  .ttl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#92929c;margin:0 0 14px}
  .grid{display:flex;gap:0}
  .sw{flex:1}
  .chip{height:58px}
  .first .chip{border-radius:9px 0 0 9px}
  .last .chip{border-radius:0 9px 9px 0}
  .nm{font-size:10.5px;font-weight:600;margin-top:9px;color:#27272a}
  .hex{font-size:10px;color:#92929c;font-variant-numeric:tabular-nums;margin-top:1px}
</style></head>
<body>
  <p class="ttl">Console neutrals · --bl-* light</p>
  <div class="grid">
    <div class="sw first"><div class="chip" style="background:#f7f7f8;border:1px solid #e7e7ea;border-right:none"></div><div class="nm">surface-0</div><div class="hex">#F7F7F8</div></div>
    <div class="sw"><div class="chip" style="background:#ffffff;border:1px solid #e7e7ea;border-right:none"></div><div class="nm">surface-1</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:#f4f4f5;border:1px solid #e7e7ea;border-right:none"></div><div class="nm">surface-2</div><div class="hex">#F4F4F5</div></div>
    <div class="sw"><div class="chip" style="background:#e7e7ea"></div><div class="nm">border</div><div class="hex">#E7E7EA</div></div>
    <div class="sw"><div class="chip" style="background:#d7d7dc"></div><div class="nm">border-strong</div><div class="hex">#D7D7DC</div></div>
    <div class="sw"><div class="chip" style="background:#92929c"></div><div class="nm">text-3</div><div class="hex">#92929C</div></div>
    <div class="sw"><div class="chip" style="background:#5c5c66"></div><div class="nm">text-2</div><div class="hex">#5C5C66</div></div>
    <div class="sw last"><div class="chip" style="background:#1a1a1f"></div><div class="nm">text-1</div><div class="hex">#1A1A1F</div></div>
  </div>
</body></html>
