services:
  blommunity-db:
    image: postgres:18-alpine
    container_name: blommunity-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - blommunity-db-volume:/var/lib/postgresql
  blommunity-cache:
    image: valkey/valkey:9-alpine
    container_name: blommunity-cache
    restart: always
    command: ['valkey-server', '--protected-mode', 'no', '--save', '']
    ports:
      - '127.0.0.1:6379:6379'

volumes:
  blommunity-db-volume:
    name: blommunity-db-volume
